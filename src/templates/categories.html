{% extends "base.html" %}
{% block title %}{% if disc_name %}{{ disc_name }} — {% endif %}Categories{% endblock %}
{% block content %}
<h1>Categories</h1>
{% for cat, pages in cats.items() %}
<h2 id="{{ cat|replace(' ', '-')|lower }}">{{ cat }}</h2>
<ul class="page-list">
    {% for p in pages %}
    <li><a href="/wiki/{{ p|replace(' ', '_') }}{% if disc_id %}?disc={{ disc_id }}{% endif %}">{{ p }}</a></li>
    {% endfor %}
</ul>
{% endfor %}
{% endblock %}
