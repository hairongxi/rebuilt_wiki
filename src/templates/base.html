<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Physics Wiki{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
<script>
window.MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] } };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<div id="mw-wrapper">
    <nav id="mw-panel">
        <div class="logo">
            <a href="/">📚 Physics Wiki</a>
        </div>
        <div class="sidebar-section">
            <h3>Navigation</h3>
            <ul>
                <li><a href="/">🏠 Main Page</a></li>
                <li><a href="/index">📑 All Pages ({{ total_pages }})</a></li>
                <li><a href="/categories">📂 Categories</a></li>
                <li><a href="/random">🎲 Random Page</a></li>
            </ul>
        </div>
        <div class="sidebar-section">
            <h3>Search</h3>
            <form action="/search" method="get" class="search-form">
                <input type="text" name="q" placeholder="Search wiki..." value="{{ query or '' }}" autocomplete="off">
                <button type="submit">🔍</button>
            </form>
        </div>
        <div class="sidebar-section">
            <h3>Quick Links</h3>
            <ul>
                {% for link in quick_links %}
                <li><a href="/wiki/{{ link|replace(' ', '_') }}">{{ link }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </nav>
    <main id="mw-content">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
