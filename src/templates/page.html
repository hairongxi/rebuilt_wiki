{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<article class="wiki-page">
    {{ content|safe }}
</article>
<div class="page-footer">
    <p><a href="/wiki/{{ title|replace(' ', '_') }}{% if disc_id %}?disc={{ disc_id }}{% endif %}">Permalink</a></p>
</div>
{% endblock %}
