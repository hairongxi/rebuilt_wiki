{% extends "base.html" %}
{% block title %}Index{% endblock %}
{% block content %}
<h1>All Pages ({{ total }})</h1>
{% for letter, pages in groups %}
<h2 id="{{ letter }}">{{ letter }}</h2>
<ul class="page-list">
    {% for p in pages %}
    <li><a href="/wiki/{{ p|replace(' ', '_') }}{% if disc_id %}?disc={{ disc_id }}{% endif %}">{{ p }}</a></li>
    {% endfor %}
</ul>
{% endfor %}
{% endblock %}
